<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>1주차 과제</title>
  </head>
  <body>
    <header class="header">
      <img class="logo" src="./assets/Logo.svg" alt="logo" />
      <nav>
        <ul class="nav-container">
          <li><a href="#about">ABOUT</a></li>
          <li><a href="#hobby">HOBBY</a></li>
          <li><a href="#contact">CONTACT</a></li>
        </ul>
      </nav>
    </header>
    <main class="main">
      <div class="intro">
        <p>
          안녕하세요!<br />제 이름은 고명준입니다.<br />끊임없이 성장하며<br />
          소통하는 개발자가 되고 싶습니다.
        </p>
      </div>
      <section class="section">
        <article id="about" class="about-container">
          <h1 class="title">ABOUT</h1>
          <div id="contact" class="about-contents">
            <div class="info-card">
              <img class="my-photo" src="./assets/Photo.jpg" alt="myPhoto" />
              <div class="name">고명준</div>
              <div class="phone">
                <img src="./assets/Phone.svg" alt="phone" />
                <span>010-2434-0973</span>
              </div>
              <div class="email">
                <img src="./assets/Email.svg" alt="email" />
                <span>a22950973@gmail.com</span>
              </div>
              <div class="address">
                <img src="./assets/Address.svg" alt="address" />
                <span>경기도 의정부시 신곡동</span>
              </div>
            </div>
            <div class="education">
              <h2>EDUCATION</h2>
              <p>한성대학교 컴퓨터공학부<br />2020.03~2027.02(졸업예정)</p>
            </div>
            <div class="skills">
              <h2>SKILLS</h2>
              <p>HTML<br />CSS<br />JavaScript</p>
            </div>
            <div class="work">
              <h2>WORK</h2>
              <p>프론트엔드 개발자(예정)</p>
            </div>
            <div class="activities">
              <h2>ACTIVITIES</h2>
              <p>멋쟁이사자처럼 14기</p>
            </div>
          </div>
        </article>
        <article id="hobby" class="hobby-container">
          <h1 class="title">HOBBY</h1>
          <div class="hobby-contents">
            <div class="hobby-card">
              <div class="card-header">게임하기</div>
              <div class="card-body">
                <img src="./assets/LoL.png" alt="game" />
              </div>
            </div>
            <div class="hobby-card">
              <div class="card-header">넷플릭스 보기</div>
              <div class="card-body">
                <img src="./assets/Netflix.png" alt="netflix" />
              </div>
            </div>
            <div class="hobby-card">
              <div class="card-header">운동하기</div>
              <div class="card-body">
                <img src="./assets/Exercise.png" alt="exercise" />
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
